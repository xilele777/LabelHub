version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: labelhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: labelhub
      POSTGRES_PASSWORD: labelhub123
      POSTGRES_DB: labelhub
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U labelhub -d labelhub']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: labelhub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

volumes:
  pgdata:
    name: labelhub_pgdata
  redisdata:
    name: labelhub_redisdata
