name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npx eslint . --max-warnings 50

      - name: Check format
        run: npx prettier --check "src/**/*.{ts,vue}" "*.config.{ts,js,mjs}"

      - name: Install backend deps
        run: cd server && npm ci

      - name: Lint backend
        run: cd server && npx eslint . --max-warnings 50

      - name: Check backend format
        run: cd server && npx prettier --check "**/*.{js,ts}" "!node_modules/**"

  # ── Typecheck ─────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check (frontend)
        run: npx tsc -p tsconfig.json --noEmit

      - name: Install backend deps
        run: cd server && npm ci

      - name: TypeScript check (backend)
        run: cd server && npm run typecheck

  # ── Test ──────────────────────────────────────────────────
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        run: cd server && npm ci

      - name: Reset test database
        run: cd server && npm run test:reset

      - name: Start server
        run: |
          cd server && node index.js &
          sleep 3
          curl -s http://localhost:3001/api/health

      - name: Run E2E tests
        run: cd server && npm run test:e2e

  # ── Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check bundle size budget
        run: node scripts/check-bundle-size.cjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
